<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chart - Next Generation Data Visualization Dashboard">
    <title>Chart | Visualize the Future</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">CHART.</div>
            <nav>
                <ul>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">Resources</a></li>
                    <li><a href="#">Pricing</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
            <a href="#" class="btn" style="padding: 0.6rem 1.5rem; font-size: 0.9rem;">Sign In</a>
        </header>

        <main>
            <section class="hero">
                <div class="hero-glow"></div>
                <h1 class="animate-in" style="animation-delay: 0.1s;">Visualize Data.<br>Faster than ever.</h1>
                <p class="animate-in" style="animation-delay: 0.2s;">Transform complex data into beautiful, actionable insights with our state-of-the-art charting engine.</p>
                <div class="animate-in" style="animation-delay: 0.3s;">
                    <a href="#" class="btn">Get Started for Free</a>
                </div>

                <div class="chart-preview animate-in" style="animation-delay: 0.4s;" id="chartContainer">
                    <!-- Dynamic Bars will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
